<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>RecapCoach API</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b0d12;
      --fg: #e6e9ef;
      --muted: #8b93a4;
      --accent: #6ea8fe;
      --card: #161922;
      --border: #232838;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fb;
        --fg: #1a1d24;
        --muted: #5a6477;
        --accent: #2563eb;
        --card: #ffffff;
        --border: #e3e6ee;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.55;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      letter-spacing: -0.01em;
    }
    .badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    p { margin: 8px 0; color: var(--muted); }
    code {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 13px;
    }
    ul {
      padding-left: 18px;
      margin: 16px 0;
    }
    li { margin: 6px 0; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">ONLINE</span>
    <h1>RecapCoach API</h1>
    <p>Backend for the RecapCoach Android app. Wraps OpenAI Whisper and gpt-4o-mini.</p>

    <h3 style="margin-top: 24px; margin-bottom: 8px; font-size: 14px;">Endpoints</h3>
    <ul>
      <li><code>POST /api/transcribe</code> &mdash; multipart audio &rarr; transcript + summary + action items</li>
    </ul>

    <p style="margin-top: 24px; font-size: 13px;">
      Source: <a href="https://github.com/ketankshukla/recapcoach">github.com/ketankshukla/recapcoach</a>
    </p>
  </div>
</body>
</html>
